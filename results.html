<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Results - Chest X-ray Report Refinement System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1280px; height: 720px; overflow: hidden;
      background: #050d1a;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .slide { width: 1280px; height: 720px; position: relative; display: flex; flex-direction: column; cursor: pointer; }

    .bg-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(21,40,64,0.22) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(21,40,64,0.22) 1px, transparent 1px);
      background-size: 64px 64px; pointer-events: none;
    }

    .header { position: absolute; top: 0; left: 0; right: 0; height: 58px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #0d1f38; z-index: 1; }
    .h-title { font-size: 1rem; font-weight: 700; letter-spacing: 0.35em; text-transform: uppercase; color: #60a5fa; }

    .content { position: absolute; top: 58px; left: 0; right: 0; bottom: 0; display: flex; }

    /* ── Table (full width) ── */
    .right-col {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px 64px;
      opacity: 0;
    }
    .right-col.active { animation: a-in 0.5s ease forwards; }

    .table-wrap { width: 100%; max-width: 1080px; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 12px 18px; text-align: right;
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: #2c4a6e; border-bottom: 1px solid #0d1f38;
    }
    thead th:first-child { text-align: left; }

    tbody tr { border-bottom: 1px solid #080f1e; }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      padding: 16px 18px; text-align: right;
      font-size: 1.05rem; color: #475569;
    }
    tbody td:first-child { text-align: left; }

    /* Version cell */
    .ver { display: inline-block; font-size: 1rem; font-weight: 700; padding: 3px 12px; border-radius: 6px; }
    .ver-base { color: #64748b; }
    .ver-blue { color: #60a5fa; }
    .ver-final { color: #60a5fa; }

    /* Best value highlight */
    .best-red    { color: #f87171; font-weight: 700; }
    .rise-red    { color: rgba(248,113,113,0.55); font-weight: 600; }

    /* Baseline row */
    .row-base td { color: #4b5563; }

    /* v4 highlight row */
    .row-final td { background: rgba(34,197,94,0.04); }
    .row-final-border { height: 2px; background: linear-gradient(to right, transparent, rgba(34,197,94,0.3), transparent); }

    .note { margin-top: 18px; font-size: 0.75rem; color: #1e3a5f; line-height: 1.6; text-align: center; }

    @keyframes a-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* ── Responsive scaling: fit fixed-size canvas to any viewport ── */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #slideContainer { flex-shrink: 0; }
      /* ── Gallery nav button (global) ── */
    .gallery-nav-btn {
      position: absolute; top: 14px; right: 14px; z-index: 30;
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.09);
      color: #60a5fa; text-decoration: none;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    .gallery-nav-btn:hover {
      background: rgba(96,165,250,0.14); border-color: rgba(96,165,250,0.35);
      transform: scale(1.06);
    }
  </style>
</head>
<body>
<div class="slide" id="slideContainer">
  <a class="gallery-nav-btn" href="all_slides.html" title="All Slides" onclick="event.stopPropagation()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
  </a>


  <div class="bg-grid"></div>
  <div class="header"><span class="h-title">Results</span></div>

  <div class="content">

    <!-- Results table -->
    <div class="right-col rc">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Version</th>
              <th>RadGraph F1</th>
              <th>GREEN</th>
              <th>CheXBert Macro F1</th>
              <th>CheXBert Micro F1</th>
            </tr>
          </thead>
          <tbody>
            <tr class="row-base">
              <td><span class="ver ver-base">Baseline</span></td>
              <td class="best-red">0.2859</td>
              <td class="best-red">0.3821</td>
              <td>0.3442</td>
              <td>0.5179</td>
            </tr>
            <tr>
              <td><span class="ver ver-blue">v1</span></td>
              <td>0.2819</td>
              <td>0.3735</td>
              <td class="rise-red">0.3515</td>
              <td class="rise-red">0.5194</td>
            </tr>
            <tr>
              <td><span class="ver ver-blue">v2</span></td>
              <td>0.2817</td>
              <td>0.3741</td>
              <td class="rise-red">0.3478</td>
              <td class="rise-red">0.5193</td>
            </tr>
            <tr>
              <td><span class="ver ver-blue">v3</span></td>
              <td>0.2807</td>
              <td>0.3730</td>
              <td class="rise-red">0.3450</td>
              <td class="rise-red">0.5182</td>
            </tr>
            <tr class="row-final">
              <td><span class="ver ver-final">v4</span></td>
              <td>0.2819</td>
              <td>0.3726</td>
              <td class="best-red">0.3535</td>
              <td class="best-red">0.5206</td>
            </tr>
          </tbody>
        </table>
        <div class="row-final-border"></div>
        <div class="note">Tested on 500 MIMIC-CXR samples</div>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initSlideController } from './tool/slide-controller.js';
  import './tool/slide-scale.js';

  const steps = [['.rc']];

  function updateSlide(step) {
    steps.flat().forEach(sel => document.querySelectorAll(sel).forEach(el => el.classList.remove('active')));
    for (let i = 0; i < step; i++) {
      if (steps[i]) steps[i].forEach(sel => document.querySelectorAll(sel).forEach(el => el.classList.add('active')));
    }
  }

  initSlideController({
    maxSteps: steps.length,
    nextSlideUrl: 'discussion.html',
    prevSlideUrl: 'experiment_settings.html',
    onUpdate: updateSlide
  });
</script>
</body>
</html>
