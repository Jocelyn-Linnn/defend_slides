<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Research Purpose - Chest X-ray Report Refinement System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #050d1a;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .slide {
      width: 1280px;
      height: 720px;
      position: relative;
      display: flex;
      justify-content: center;
      cursor: pointer;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(21,40,64,0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(21,40,64,0.22) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 90px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      border-bottom: 2px solid #0d1f38;
      z-index: 1;
    }
    .h-kicker {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: #2c4a6e;
    }
    .h-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #60a5fa;
    }

    /* ── Objectives (single centered column) ── */
    .left-col {
      width: 980px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 110px 60px 36px;
      gap: 0;
    }

    .col-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #3b6ea5;
      margin-bottom: 20px;
    }

    .obj-list { position: relative; display: flex; flex-direction: column; }
    .obj-list::before {
      content: '';
      position: absolute;
      top: 16px; bottom: 16px; left: 20px;
      width: 2px;
      background: linear-gradient(to bottom, transparent, #16324f 8%, #16324f 92%, transparent);
      z-index: 0;
    }

    .obj {
      position: relative; z-index: 1;
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 14px 0;
      opacity: 0;
    }

    .obj.active {
      animation: a-in 0.5s ease forwards;
    }

    .obj-num {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .n-blue   { background: rgba(59,130,246,0.12);  border: 1px solid rgba(59,130,246,0.32);  color: #60a5fa; }
    .n-violet { background: rgba(139,92,246,0.12);  border: 1px solid rgba(139,92,246,0.32);  color: #a78bfa; }
    .n-teal   { background: rgba(20,184,166,0.12);  border: 1px solid rgba(20,184,166,0.32);  color: #2dd4bf; }
    .n-green  { background: rgba(34,197,94,0.12);   border: 1px solid rgba(34,197,94,0.32);   color: #4ade80; }

    .obj-body { display: flex; flex-direction: column; gap: 5px; padding-top: 2px; }

    .obj-title {
      font-size: 1.04rem;
      font-weight: 700;
      color: #e2e8f0;
      line-height: 1.3;
    }

    .obj-desc {
      font-size: 0.8rem;
      color: #8ba3c7;
      line-height: 1.55;
      max-width: 580px;
    }

    @keyframes a-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* ── Responsive scaling: fit fixed-size canvas to any viewport ── */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #slideContainer { flex-shrink: 0; }
      /* ── Gallery nav button (global) ── */
    .gallery-nav-btn {
      position: absolute; top: 14px; right: 14px; z-index: 30;
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.09);
      color: #60a5fa; text-decoration: none;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    .gallery-nav-btn:hover {
      background: rgba(96,165,250,0.14); border-color: rgba(96,165,250,0.35);
      transform: scale(1.06);
    }
  </style>
</head>
<body>
<div class="slide" id="slideContainer">
  <a class="gallery-nav-btn" href="all_slides.html" title="All Slides" onclick="event.stopPropagation()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
  </a>

  <div class="bg-grid"></div>

  <div class="header">
    <span class="h-kicker">Chest X-ray Report Refinement System</span>
    <span class="h-title">Research Purpose</span>
  </div>

  <!-- 4 objectives, single centered column -->
  <div class="left-col">
    <div class="col-label">Research Objectives</div>

    <div class="obj-list">
      <div class="obj o1">
        <div class="obj-num n-blue">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        </div>
        <div class="obj-body">
          <span class="obj-title">Integrated Report Generation &amp; Refinement Pipeline</span>
        </div>
      </div>

      <div class="obj o2">
        <div class="obj-num n-violet">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="12" cy="18" r="3"/><line x1="8.6" y1="7.6" x2="15" y2="16"/><line x1="15.4" y1="7.6" x2="9" y2="16"/><line x1="9" y1="6" x2="15" y2="6"/></svg>
        </div>
        <div class="obj-body">
          <span class="obj-title">Radiology Association Graph Construction</span>
        </div>
      </div>

      <div class="obj o3">
        <div class="obj-num n-teal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
        </div>
        <div class="obj-body">
          <span class="obj-title">Graph Retrieval Module for Clinical Associations</span>
        </div>
      </div>

      <div class="obj o4">
        <div class="obj-num n-green">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.5 8.5 0 0 1-8.5 8.5 8.4 8.4 0 0 1-4-1L3 21l1.1-5.5a8.4 8.4 0 0 1-1-4A8.5 8.5 0 0 1 11.5 3h.5a8.5 8.5 0 0 1 8 8v.5z"/><line x1="8" y1="10.5" x2="16" y2="10.5"/><line x1="8" y1="14" x2="13" y2="14"/></svg>
        </div>
        <div class="obj-body">
          <span class="obj-title">LLM-based Clinical QA &amp; Report Refinement</span>
        </div>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import { initSlideController } from './tool/slide-controller.js';
  import './tool/slide-scale.js';

  const steps = [
    ['.o1'],
    ['.o2'],
    ['.o3'],
    ['.o4'],
  ];

  function updateSlide(step) {
    steps.flat().forEach(sel => {
      document.querySelectorAll(sel).forEach(el => el.classList.remove('active'));
    });
    for (let i = 0; i < step; i++) {
      if (steps[i]) {
        steps[i].forEach(sel => {
          document.querySelectorAll(sel).forEach(el => el.classList.add('active'));
        });
      }
    }
  }

  initSlideController({
    maxSteps: steps.length,
    nextSlideUrl: 'prior_work_1.html',
    prevSlideUrl: 'motivation_2.html',
    onUpdate: updateSlide
  });
</script>
</body>
</html>
