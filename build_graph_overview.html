<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Section Overview - Build Radiology Association Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #050d1a;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .slide {
      width: 1280px;
      height: 720px;
      position: relative;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    /* ── Background grid ── */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(21,40,64,0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(21,40,64,0.22) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-bottom: 1px solid #0d1f38;
      z-index: 1;
    }

    .h-kicker {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #2c4a6e;
      opacity: 0;
      animation: a-fade 0.7s ease 0.1s forwards;
    }

    .h-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #60a5fa;
      opacity: 0;
      animation: a-fade 0.7s ease 0.15s forwards;
    }

    /* ── Content area ── */
    .content {
      position: absolute;
      top: 70px; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 16px;
    }

    /* ── SVG card ── */
    .svg-card {
      height: 100%;
      background: #f5f4f0;
      border-radius: 10px;
      padding: 4px 8px;
      box-shadow: 0 6px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
    }

    .svg-card svg {
      height: 100%;
      width: auto;
      display: block;
    }

    /* ── Highlight box entrance ── */
    .scope-highlight {
      opacity: 0;
      animation: a-glow 1s ease 0.4s forwards;
    }

    @keyframes a-fade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes a-glow {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    /* ── Responsive scaling: fit fixed-size canvas to any viewport ── */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #slideContainer { flex-shrink: 0; }
      /* ── Gallery nav button (global) ── */
    .gallery-nav-btn {
      position: absolute; top: 14px; right: 14px; z-index: 30;
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.09);
      color: #60a5fa; text-decoration: none;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    .gallery-nav-btn:hover {
      background: rgba(96,165,250,0.14); border-color: rgba(96,165,250,0.35);
      transform: scale(1.06);
    }
  </style>
</head>
<body>
