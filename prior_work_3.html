<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Prior Work II - Chest X-ray Report Refinement System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1280px; height: 720px; overflow: hidden;
      background: #050d1a;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .slide { width: 1280px; height: 720px; position: relative; display: flex; flex-direction: column; cursor: pointer; }

    .bg-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(21,40,64,0.22) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(21,40,64,0.22) 1px, transparent 1px);
      background-size: 64px 64px; pointer-events: none;
    }

    .header { position: absolute; top: 0; left: 0; right: 0; height: 58px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #0d1f38; z-index: 1; }
    .h-title { font-size: 1rem; font-weight: 700; letter-spacing: 0.35em; text-transform: uppercase; color: #60a5fa; }

    .content { position: absolute; top: 58px; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; }

    /* ── Left: Correction methods ── */
    .left-col { width: 760px; display: flex; flex-direction: column; justify-content: center; padding: 20px 40px; gap: 46px; }
    .col-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #3b82f6; }

    .mgroup { display: flex; flex-direction: column; gap: 12px; opacity: 0; }
    .mgroup.active { animation: a-in 0.52s ease forwards; }

    .mg-head { display: flex; align-items: center; gap: 12px; }
    .mg-icon { width: 32px; height: 32px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .mi-blue  { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.24); }
    .mi-amber { background: rgba(245,158,11,0.1);  border: 1px solid rgba(245,158,11,0.24); }
    .mg-title { font-size: 1.08rem; font-weight: 700; color: #cbd5e1; }
    .mg-ref   { font-size: 0.75rem; color: #2563a8; font-weight: 600; margin-top: 2px; }

    .mg-bullets { display: flex; flex-direction: column; gap: 9px; padding-left: 44px; }
    .mb { display: flex; align-items: flex-start; gap: 9px; }
    .mdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 8px; }
    .md-blue  { background: #1a3356; }
    .md-amber { background: #78350f; }
    .mb-text  { font-size: 0.88rem; color: #64748b; line-height: 1.55; }
    .mb-text b { color: #cbd5e1; }

    .mg-limit { display: flex; align-items: flex-start; gap: 8px; margin-top: 4px; padding: 9px 12px; border-radius: 7px; background: rgba(100,116,139,0.07); border: 1px solid rgba(100,116,139,0.12); margin-left: 44px; }
    .ml-text  { font-size: 0.82rem; color: #64748b; line-height: 1.55; }
    .ml-text b { color: #94a3b8; }

    @keyframes a-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* ── Responsive scaling: fit fixed-size canvas to any viewport ── */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #slideContainer { flex-shrink: 0; }
      /* ── Gallery nav button (global) ── */
    .gallery-nav-btn {
      position: absolute; top: 14px; right: 14px; z-index: 30;
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.09);
      color: #60a5fa; text-decoration: none;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    .gallery-nav-btn:hover {
      background: rgba(96,165,250,0.14); border-color: rgba(96,165,250,0.35);
      transform: scale(1.06);
    }
  </style>
</head>
<body>
<div class="slide" id="slideContainer">
  <a class="gallery-nav-btn" href="all_slides.html" title="All Slides" onclick="event.stopPropagation()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
  </a>


  <div class="bg-grid"></div>
  <div class="header"><span class="h-title">Prior Work</span></div>

  <div class="content">

    <!-- Left: Correction Methods -->
    <div class="left-col">
      <div class="col-label">Report Correction Methods</div>

      <!-- Group 2: Fact-Checking Filtering -->
      <div class="mgroup g2">
        <div class="mg-head">
          <div class="mg-icon mi-amber">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          </div>
          <div>
            <div class="mg-title">Fact-Checking &amp; Filtering</div>
            <div class="mg-ref">2024–2025 · Mahmood et al.</div>
          </div>
        </div>
        <div class="mg-bullets">
          <div class="mb"><div class="mdot md-amber"></div><span class="mb-text"><b>CLIP</b> encodes each sentence–image pair</span></div>
          <div class="mb"><div class="mdot md-amber"></div><span class="mb-text"><b>SVM</b> classifies consistency from the embeddings</span></div>
          <div class="mb"><div class="mdot md-amber"></div><span class="mb-text">Inconsistent sentences <b>deleted</b>; rest reassembled into the report</span></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initSlideController } from './tool/slide-controller.js';
  import './tool/slide-scale.js';

  const steps = [['.g2']];

  function updateSlide(step) {
    steps.flat().forEach(sel => document.querySelectorAll(sel).forEach(el => el.classList.remove('active')));
    for (let i = 0; i < step; i++) {
      if (steps[i]) steps[i].forEach(sel => document.querySelectorAll(sel).forEach(el => el.classList.add('active')));
    }
  }

  initSlideController({
    maxSteps: steps.length,
    nextSlideUrl: 'prior_work_graph_solution.html',
    prevSlideUrl: 'prior_work_2.html',
    onUpdate: updateSlide
  });
</script>
</body>
</html>
