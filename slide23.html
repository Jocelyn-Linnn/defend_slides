<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Experiment · Result - Chest X-ray Report Refinement System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #050d1a;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .slide {
      width: 1280px;
      height: 720px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(21,40,64,0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(21,40,64,0.22) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
    }

    .section-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      opacity: 0;
      animation: a-rise 0.8s ease 0.3s forwards;
    }

    .sec-num {
      font-size: 6rem;
      font-weight: 800;
      color: #0a1e38;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .sec-line {
      width: 140px;
      height: 2px;
      background: linear-gradient(to right, transparent, #3b82f6, transparent);
    }

    .sec-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .sec-sub {
      font-size: 0.85rem;
      font-weight: 500;
      color: #2563a8;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sec-sub::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 1px;
      background: #1a3356;
    }

    @keyframes a-rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* ── Responsive scaling: fit fixed-size canvas to any viewport ── */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #slideContainer { flex-shrink: 0; }
  </style>
</head>
<body>
<div class="slide" id="slideContainer">

  <div class="bg-grid"></div>

  <div class="section-marker">
    <div class="sec-num">04</div>
    <div class="sec-line"></div>
    <div class="sec-title">Experiment</div>
    <div class="sec-sub">Result</div>
  </div>

</div>

<script type="module">
  import { initSlideController } from './tool/slide-controller.js';
  import './tool/slide-scale.js';

  initSlideController({
    maxSteps: 0,
    nextSlideUrl: 'slide24.html',
    prevSlideUrl: 'slide22.html',
    onUpdate: () => {}
  });
</script>
</body>
</html>
