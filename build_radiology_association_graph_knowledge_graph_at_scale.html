    .stat-card {

      margin-bottom: 16px;

    .stat-card.visible { opacity: 1; transform: translateX(0); }

    .stat-number {
      font-size: 2.1rem; font-weight: 800; line-height: 1; margin-bottom: 4px;
    }
    .stat-label {
      font-size: 0.68rem; color: #475569; letter-spacing: 0.09em; text-transform: uppercase;
    }

    .panel-right {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding-top: 86px;
    }
    .right-svg {
      opacity: 0; transform: scale(0.85);
      animation: a-zoom 0.9s cubic-bezier(.16,1,.3,1) 0.4s forwards;
