<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Improvement Motivation &amp; Design Logic - Chest X-ray Report Refinement System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1280px; height: 720px;
      overflow: hidden;
      background: #050d1a;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .slide { width: 1280px; height: 720px; position: relative; display: flex; cursor: pointer; }

    .header {
      position: absolute; top: 0; left: 0; right: 0; height: 90px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      border-bottom: 2px solid #0d1f38;
    }
    .h-kicker {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: #2c4a6e;
    }
    .h-title {
      font-size: 1rem; font-weight: 700;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: #60a5fa;
    }

    .divider {
      position: absolute; left: 480px; top: 110px; bottom: 36px; width: 2px;
      background: linear-gradient(to bottom, transparent 0%, #152840 15%, #152840 85%, transparent 100%);
    }

    .panel-left {
      width: 480px;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      padding: 110px 50px 36px;
    }

    .step {
      display: flex; align-items: flex-start; margin-bottom: 10px; width: 100%;
      opacity: 0; transition: opacity 0.4s ease, transform 0.4s ease; transform: translateY(6px);
    }
    .step.active { opacity: 1; transform: translateY(0); }

    .step-num {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; font-weight: 700;
      flex-shrink: 0; margin-right: 14px; margin-top: 2px;
    }
    .step-body { flex: 1; }
    .step-title { font-size: 1.02rem; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 5px; line-height: 1.3; }
    .step-desc { font-size: 0.8rem; color: #94a3b8; line-height: 1.5; }
    .step-desc ul { margin: 0; padding-left: 1.1em; list-style: disc; }
    .step-desc li { margin-bottom: 4px; }
    .step-desc li:last-child { margin-bottom: 0; }
    .step-desc b { color: #cbd5e1; }

    .sep {
      width: 100%; height: 2px;
      background: linear-gradient(to right, #0d2040, transparent);
      margin: 8px 0;
      opacity: 0; transition: opacity 0.4s ease;
    }
    .sep.active { opacity: 1; }

    .panel-right {
      width: 800px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 94px 16px 28px;
    }
    .right-svg {
      opacity: 0; transform: scale(0.92);
      animation: a-zoom 0.8s cubic-bezier(.16,1,.3,1) 0.5s forwards;
    }

    .g-step1, .g-step2 {
      opacity: 0; transition: opacity 0.5s ease;
    }
    .g-step1.active, .g-step2.active { opacity: 1; }

    @keyframes a-zoom { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    /* ── Responsive scaling: fit fixed-size canvas to any viewport ── */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #slideContainer { flex-shrink: 0; }
      /* ── Gallery nav button (global) ── */
    .gallery-nav-btn {
      position: absolute; top: 14px; right: 14px; z-index: 30;
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.09);
      color: #60a5fa; text-decoration: none;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    .gallery-nav-btn:hover {
      background: rgba(96,165,250,0.14); border-color: rgba(96,165,250,0.35);
      transform: scale(1.06);
    }
  </style>
</head>
<body>
<div class="slide" id="slideContainer">
  <a class="gallery-nav-btn" href="all_slides.html" title="All Slides" onclick="event.stopPropagation()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
  </a>

  <div class="header">
    <span class="h-kicker">System Design</span>
    <span class="h-title">Improvement Motivation &amp; Design Logic</span>
  </div>
  <div class="divider"></div>

  <!-- ── Left Panel ── -->
  <div class="panel-left">

    <div class="step" id="step1">
      <div class="step-num" style="background:#2a0c0c;border:2px solid #ef4444;color:#f87171;">1</div>
      <div class="step-body">
        <div class="step-title" style="color:#f87171;">The Problem — Supplementing Adds Hallucinations</div>
      </div>
    </div>

    <div class="sep" id="sep1"></div>

    <div class="step" id="step2">
      <div class="step-num" style="background:#0b2619;border:2px solid #22c55e;color:#4ade80;">2</div>
      <div class="step-body">
        <div class="step-title" style="color:#4ade80;">The Design Logic — A Complementary Examiner</div>
        <div class="step-desc">
          <ul>
            <li><span style="font-size:1.15em;font-weight:700;color:#e2e8f0;">Mahmood et al. (2025)</span>'s <b>Fact-Checking Examiner</b></li>
          </ul>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Right Panel: original system → new module → final report ── -->
  <div class="panel-right">
    <svg width="720" height="552" viewBox="0 0 580 460" fill="none" class="right-svg">
      <defs>
        <marker id="arr-red"   markerWidth="8" markerHeight="8" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#ef4444"/></marker>
        <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#22c55e"/></marker>
      </defs>

      <!-- STEP 1: original system block -->
      <g class="g-step1" id="gStep1">
        <rect x="20" y="20" width="540" height="120" rx="10" fill="#0a1220" stroke="#3b82f6" stroke-width="2"/>
        <text x="36" y="42" fill="#60a5fa" font-size="13" font-weight="700" letter-spacing="0.08em">① ORIGINAL SYSTEM</text>
        <text x="36" y="66" fill="#93c5fd" font-size="11"><tspan font-weight="700">Role:</tspan> Supplements missing findings — only adds, never removes</text>
        <text x="36" y="88" fill="#93c5fd" font-size="11"><tspan font-weight="700">Method:</tspan> Retrieval + QA supplement omitted findings</text>

        <line x1="290" y1="142" x2="290" y2="168" stroke="#ef4444" stroke-width="1.8" marker-end="url(#arr-red)"/>
        <text x="308" y="160" fill="#f87171" font-size="10" font-style="italic">catches missed findings, but also increases FP</text>
      </g>

      <!-- STEP 2: new module + final report -->
      <g class="g-step2" id="gStep2">
        <rect x="20" y="172" width="540" height="100" rx="10" fill="#071a10" stroke="#22c55e" stroke-width="2"/>
        <text x="36" y="194" fill="#4ade80" font-size="13" font-weight="700" letter-spacing="0.08em">② NEW MODULE · FACT-CHECKING EXAMINER</text>
        <text x="36" y="218" fill="#86efac" font-size="11"><tspan font-weight="700">Role:</tspan> Removes incorrect sentences — only removes, never adds</text>
        <text x="36" y="240" fill="#86efac" font-size="11"><tspan font-weight="700">Method:</tspan> SVM classifies whether each report sentence is factually true</text>

        <line x1="290" y1="282" x2="290" y2="308" stroke="#22c55e" stroke-width="1.8" marker-end="url(#arr-green)"/>
        <text x="308" y="300" fill="#4ade80" font-size="10" font-style="italic">removes fabricated sentences</text>

        <rect x="20" y="310" width="540" height="112" rx="10" fill="#0d0a1f" stroke="#8b5cf6" stroke-width="2"/>
        <text x="36" y="332" fill="#c4b5fc" font-size="13" font-weight="700" letter-spacing="0.08em">③ FINAL CORRECTED REPORT</text>
        <text x="36" y="368" fill="#a78bfa" font-size="10.5" font-weight="700">→ balanced report: fewer missed findings, fewer hallucinations</text>
      </g>

    </svg>
  </div>

</div>

<script type="module">
  import { initSlideController } from './tool/slide-controller.js';
  import './tool/slide-scale.js';

  const maxSteps = 2;

  function updateSlide(step) {
    document.querySelectorAll('.active').forEach(el => el.classList.remove('active'));

    if (step >= 1) {
      document.getElementById('step1').classList.add('active');
      document.getElementById('gStep1').classList.add('active');
    }
    if (step >= 2) {
      document.getElementById('sep1').classList.add('active');
      document.getElementById('step2').classList.add('active');
      document.getElementById('gStep2').classList.add('active');
    }
  }

  initSlideController({
    maxSteps,
    nextSlideUrl: 'extended_experiment_fact_checking_examiner_results.html',
    prevSlideUrl: 'failure_mode_analysis_of_metric_regression.html',
    onUpdate: updateSlide
  });
</script>
</body>
</html>
