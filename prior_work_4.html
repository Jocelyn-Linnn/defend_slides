<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Prior Work III - Chest X-ray Report Refinement System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1280px; height: 720px; overflow: hidden;
      background: #050d1a;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .slide { width: 1280px; height: 720px; position: relative; display: flex; flex-direction: column; cursor: pointer; }

    .bg-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(21,40,64,0.22) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(21,40,64,0.22) 1px, transparent 1px);
      background-size: 64px 64px; pointer-events: none;
    }

    .header { position: absolute; top: 0; left: 0; right: 0; height: 58px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #0d1f38; z-index: 1; }
    .h-title { font-size: 1rem; font-weight: 700; letter-spacing: 0.35em; text-transform: uppercase; color: #60a5fa; }

    .content { position: absolute; top: 58px; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; }

    /* ── RadGraph ── */
    .center-col { width: 640px; display: flex; flex-direction: column; justify-content: center; padding: 20px 40px; gap: 13px; opacity: 0; }
    .center-col.active { animation: a-in 0.55s ease forwards; }

    .rg-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #3b82f6; }
    .rg-title { font-size: 1.05rem; font-weight: 700; color: #cbd5e1; }

    .rg-stats { display: flex; gap: 10px; }
    .stat-box { flex: 1; padding: 8px 12px; border-radius: 7px; border: 1px solid #0d1f38; background: rgba(14,31,56,0.3); display: flex; flex-direction: column; gap: 2px; }
    .stat-num { font-size: 1rem; font-weight: 800; color: #60a5fa; letter-spacing: -0.02em; }
    .stat-lbl { font-size: 0.58rem; color: #2563a8; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }

    .insight { display: flex; align-items: flex-start; gap: 9px; padding: 9px 12px; border-radius: 7px; background: rgba(124,58,237,0.07); border: 1px solid rgba(124,58,237,0.2); }
    .insight-text { font-size: 0.71rem; color: #94a3b8; line-height: 1.5; }
    .insight-text b { color: #a78bfa; }

    @keyframes a-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* ── Responsive scaling: fit fixed-size canvas to any viewport ── */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #slideContainer { flex-shrink: 0; }
      /* ── Gallery nav button (global) ── */
    .gallery-nav-btn {
      position: absolute; top: 14px; right: 14px; z-index: 30;
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.09);
      color: #60a5fa; text-decoration: none;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    .gallery-nav-btn:hover {
      background: rgba(96,165,250,0.14); border-color: rgba(96,165,250,0.35);
      transform: scale(1.06);
    }
  </style>
</head>
<body>
<div class="slide" id="slideContainer">
  <a class="gallery-nav-btn" href="all_slides.html" title="All Slides" onclick="event.stopPropagation()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
  </a>


  <div class="bg-grid"></div>
  <div class="header"><span class="h-title">Prior Work</span></div>

  <div class="content">

    <!-- RadGraph -->
    <div class="center-col rc">
      <div class="rg-label">Knowledge Graph Foundation</div>
      <div class="rg-title">RadGraph Schema</div>

      <!-- Diagram -->
      <svg viewBox="0 0 310 196" width="310" height="196" style="overflow:visible;display:block">
        <defs>
          <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
            <path d="M0,0 L7,3.5 L0,7 Z" fill="#1e3a5f"/>
          </marker>
          <marker id="arr-s" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
            <path d="M0,0 L7,3.5 L0,7 Z" fill="#7c3aed"/>
          </marker>
        </defs>

        <!-- ANATOMY node -->
        <rect x="90" y="6" width="130" height="30" rx="7" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.35)" stroke-width="1.2"/>
        <text x="155" y="25" text-anchor="middle" font-size="10" font-weight="700" fill="#60a5fa" font-family="system-ui">ANATOMY</text>

        <!-- OBS: Definitely Present -->
        <rect x="65" y="86" width="180" height="30" rx="7" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.32)" stroke-width="1.2"/>
        <text x="155" y="105" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a78bfa" font-family="system-ui">OBS · DEFINITELY PRESENT</text>

        <!-- OBS: Uncertain -->
        <rect x="178" y="156" width="128" height="28" rx="7" fill="rgba(245,158,11,0.09)" stroke="rgba(245,158,11,0.28)" stroke-width="1.2"/>
        <text x="242" y="174" text-anchor="middle" font-size="9" font-weight="700" fill="#fbbf24" font-family="system-ui">OBS · UNCERTAIN</text>

        <!-- OBS: Definitely Absent -->
        <rect x="4" y="156" width="148" height="28" rx="7" fill="rgba(100,116,139,0.09)" stroke="rgba(100,116,139,0.25)" stroke-width="1.2"/>
        <text x="78" y="174" text-anchor="middle" font-size="9" font-weight="700" fill="#64748b" font-family="system-ui">OBS · ABSENT</text>

        <!-- Arrow: OBS(DP) → ANATOMY: LOCATE_AT -->
        <line x1="143" y1="86" x2="147" y2="36" stroke="#1e3a5f" stroke-width="1.2" marker-end="url(#arr)"/>
        <text x="100" y="65" font-size="7.5" fill="#2563a8" font-weight="700" font-family="system-ui">LOCATE_AT</text>

        <!-- Arrow: OBS(DP) → OBS(DA): MODIFY -->
        <line x1="103" y1="116" x2="80" y2="154" stroke="#1e3a5f" stroke-width="1.2" marker-end="url(#arr)"/>
        <text x="54" y="143" font-size="7.5" fill="#2563a8" font-weight="700" font-family="system-ui">MODIFY</text>

        <!-- Arrow: OBS(DP) → OBS(U): SUGGESTIVE_OF (highlighted dashed) -->
        <line x1="208" y1="116" x2="228" y2="154" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arr-s)"/>
        <text x="210" y="141" font-size="7.5" fill="#7c3aed" font-weight="700" font-family="system-ui">SUGGESTIVE_OF</text>
      </svg>

      <!-- Stats -->
      <div class="rg-stats">
        <div class="stat-box">
          <div class="stat-num">220K+</div>
          <div class="stat-lbl">Reports</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">6M+</div>
          <div class="stat-lbl">Entity Nodes</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">4M+</div>
          <div class="stat-lbl">Relations</div>
        </div>
      </div>

      <!-- Key insight -->
      <div class="insight">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:2px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span class="insight-text"><b>SUGGESTIVE_OF</b> encodes implicit clinical reasoning — enables discovering findings that never appear in the original report text.</span>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initSlideController } from './tool/slide-controller.js';
  import './tool/slide-scale.js';

  const steps = [['.rc']];

  function updateSlide(step) {
    steps.flat().forEach(sel => document.querySelectorAll(sel).forEach(el => el.classList.remove('active')));
    for (let i = 0; i < step; i++) {
      if (steps[i]) steps[i].forEach(sel => document.querySelectorAll(sel).forEach(el => el.classList.add('active')));
    }
  }

  initSlideController({
    maxSteps: steps.length,
    nextSlideUrl: 'methodology.html',
    prevSlideUrl: 'prior_work_3.html',
    onUpdate: updateSlide
  });
</script>
</body>
</html>
